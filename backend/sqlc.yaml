version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query.sql"
    schema: "db/migrations"
    database:
      uri: "env:DB_CONNECTION"
    gen:
      go:
        package: "db"
        out: "pkg/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "json"
            go_type:
              type: "json.RawMessage"
          - db_type: "jsonb"
            go_type:
              type: "json.RawMessage"
